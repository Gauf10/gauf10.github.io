<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibra</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#f4f4f0;
  font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;
  display:flex;flex-direction:column;align-items:center;
  min-height:100vh;padding:14px 8px;color:#1a1a1a;user-select:none;
}
h1{font-size:13px;font-weight:700;letter-spacing:6px;text-transform:uppercase;margin-bottom:10px}
#app{display:flex;flex-direction:column;align-items:center;width:100%;max-width:860px}
.hud{display:flex;gap:20px;margin-bottom:8px;align-items:center}
.hi{text-align:center}
.hl{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:#999;margin-bottom:1px}
.hv{font-size:20px;font-weight:700;line-height:1}
#game-wrap{position:relative;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.1)}
canvas{display:block}
.ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(244,244,240,.93)}
.ov h2{font-size:20px;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.ov .big{font-size:52px;font-weight:800;margin-bottom:14px;line-height:1}
.ov p{font-size:11px;color:#666;text-align:center;line-height:2.2;max-width:270px;margin-bottom:20px}
.btn{padding:10px 28px;background:#1a1a1a;color:#f4f4f0;border:none;border-radius:8px;font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer}
.btn:hover{background:#333}
.btn-sm{padding:7px 16px;font-size:10px;letter-spacing:2px}

/* Right panel */
#right{display:flex;flex-direction:column;align-items:center;gap:9px;width:100%;margin-top:8px}

/* Chord display */
#chord-panel{background:#fff;border-radius:10px;padding:14px 18px;display:flex;flex-direction:column;align-items:center;width:100%;max-width:360px;box-shadow:0 1px 3px rgba(0,0,0,.06);min-height:90px;justify-content:center}
#chord-panel .hl{margin-bottom:6px}
#chord-big{font-size:46px;font-weight:800;line-height:1;letter-spacing:2px;transition:color .08s}
#chord-hz{font-size:9px;color:#bbb;margin-top:5px;letter-spacing:1px;height:12px}

/* Calibration panel */
#calib-panel{background:#fff;border-radius:10px;padding:16px 18px;display:none;flex-direction:column;align-items:center;width:100%;max-width:360px;box-shadow:0 1px 3px rgba(0,0,0,.06);gap:10px}
#calib-chord-name{font-size:54px;font-weight:800;letter-spacing:2px;border-radius:10px;padding:8px 24px;margin:4px 0}
#calib-progress{font-size:22px;letter-spacing:6px}
#calib-status{font-size:10px;letter-spacing:1px;color:#999;height:14px}
#calib-bar{width:100%;height:4px;background:#eee;border-radius:2px;overflow:hidden}
#calib-bar-fill{height:100%;width:0%;background:#16a34a;border-radius:2px;transition:width .1s}

/* Waveform */
#wave-wrap{position:relative;border-radius:8px;overflow:hidden;width:100%;max-width:360px}
.wlabel{position:absolute;top:5px;left:8px;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:#ccc}

/* Chord buttons */
.cbbtns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.cb{width:52px;height:52px;border-radius:50%;border:2px solid;font-size:13px;font-weight:700;cursor:pointer;transition:transform .1s;font-family:inherit}
.cb:active{transform:scale(.88)}

/* Controls */
.ctrls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center}
.mbtn{padding:6px 14px;border:1px solid #ddd;background:transparent;border-radius:6px;font-size:10px;font-family:inherit;cursor:pointer;color:#999;transition:all .15s}
.mbtn.on{border-color:#16a34a;color:#16a34a;background:#f0fdf4}
.mbtn.calib{border-color:#d97706;color:#d97706;background:#fffbeb}
.hint{font-size:9px;color:#bbb;letter-spacing:1px}

/* Desktop layout */
@media (min-width:720px){
  body{padding:20px 16px}
  h1{margin-bottom:0}
  #app{flex-direction:row;align-items:flex-start;gap:28px;justify-content:center}
  #left{display:flex;flex-direction:column;align-items:center;gap:8px;flex:0 0 auto}
  #right{margin-top:0;width:260px;flex:0 0 260px;align-items:stretch}
  #chord-panel,#calib-panel,#wave-wrap{max-width:none}
  #chord-big{font-size:54px}
  #calib-chord-name{font-size:50px}
  .cb{width:46px;height:46px;font-size:12px}
}
</style>
</head>
<body>
<h1>Vibra</h1>
<div id="app">

  <!-- Left: HUD + canvas -->
  <div id="left">
    <div class="hud">
      <div class="hi"><div class="hl">Score</div><div class="hv" id="score">0</div></div>
      <div class="hi"><div class="hl">Vidas</div><div class="hv" id="lives" style="color:#ef4444">♥♥♥</div></div>
      <div class="hi"><div class="hl">Combo</div><div class="hv" id="combo" style="color:#f59e0b">—</div></div>
      <div class="hi"><div class="hl">Nivel</div><div class="hv" id="level">1</div></div>
    </div>
    <div id="game-wrap">
      <canvas id="gc" width="360" height="500"></canvas>
      <div class="ov" id="ov"><div id="oc"></div></div>
    </div>
  </div>

  <!-- Right: detection panel + waveform + buttons -->
  <div id="right">

    <!-- Chord detected display (normal play) -->
    <div id="chord-panel">
      <div class="hl">Acorde detectado</div>
      <div id="chord-big">—</div>
      <div id="chord-hz"></div>
    </div>

    <!-- Calibration UI -->
    <div id="calib-panel">
      <div class="hl" id="calib-title" style="letter-spacing:2px">CALIBRACIÓN</div>
      <div id="calib-chord-name">G</div>
      <div id="calib-progress">○ ○ ○</div>
      <div id="calib-bar"><div id="calib-bar-fill"></div></div>
      <div id="calib-status">esperando rasgueo…</div>
    </div>

    <div id="wave-wrap">
      <canvas id="wc" width="260" height="60"></canvas>
      <span class="wlabel">Waveform</span>
    </div>

    <div class="cbbtns" id="cbbtns"></div>

    <div class="ctrls">
      <button class="mbtn" id="mbtn">🎤 Activar micrófono</button>
      <span class="hint">Teclas: G C D E A</span>
    </div>

  </div>
</div>

<script>
const GW=360, GH=500;
const SLASH_Y=GH*.83;
const CHORDS=['G','C','D','Em','Am'];
const KEY_MAP={g:'G',c:'C',d:'D',e:'Em',a:'Am'};
const KMR={G:'g',C:'c',D:'d',Em:'e',Am:'a'};
const PAL={
  G: {bg:'#FEF3C7',bdr:'#D97706',tx:'#92400E'},
  C: {bg:'#CFFAFE',bdr:'#0891B2',tx:'#164E63'},
  D: {bg:'#FCE7F3',bdr:'#DB2777',tx:'#831843'},
  Em:{bg:'#DCFCE7',bdr:'#16A34A',tx:'#14532D'},
  Am:{bg:'#EDE9FE',bdr:'#7C3AED',tx:'#4C1D95'},
};

// ─── Calibration-based chord detection ────────────────────────────────────────
//
// Strategy (same as Strum Surfer per their FAQ):
//   "strum your chords 3 times so the game learns the unique frequencies of your guitar"
//
// During calibration we record 3 FFT snapshots per chord, average them into a
// fingerprint vector, and store it.  At runtime we compare incoming FFT data
// to all fingerprints using cosine similarity and pick the best match.
//
// Why this beats generic algorithms:
//   • Adapts to this specific guitar, mic, and room
//   • Immune to shared harmonics (e.g. G3=196 Hz appears in G, C, and Em)
//   • Works for any instrument — same code, different fingerprints

const fingerprints = {};      // chord → Float32Array (guitar-range FFT)
let calibIdx   = 0;           // which chord we're calibrating (0-4)
let calibCount = 0;           // strums captured for current chord (0-3)
let calibSnaps = [];          // accumulated FFT snapshots this chord
let calibPhase = 'idle';      // 'idle' | 'transient' | 'snapshot' | 'cooldown' | 'advance'
let calibPhaseT = 0;          // timestamp of last phase change

// Runtime onset detection state
let rtPhase = 'idle';         // 'idle' | 'transient'
let rtPhaseT = 0;
let envFast  = 0;             // fast RMS envelope
let envSlow  = 0;             // slow (ambient) RMS envelope

const CALIB_STRUMS = 3;       // strums per chord during calibration
const ONSET_THRES  = 0.016;   // minimum RMS to count as a strum
const MATCH_THRES  = 0.88;    // cosine similarity threshold for valid match

function guitarBins(fftSize, sr) {
  // Returns [lo, hi] bin indices covering ~60-1500 Hz (guitar fundamental range)
  const bHz = sr / fftSize;
  return [Math.ceil(60/bHz), Math.min(Math.floor(1500/bHz), fftSize/2-1)];
}

function cosineSim(a, b, lo, hi) {
  let dot=0, na=0, nb=0;
  for (let i=lo; i<=hi; i++) { dot+=a[i]*b[i]; na+=a[i]*a[i]; nb+=b[i]*b[i]; }
  return dot / (Math.sqrt(na*nb) || 1);
}

function matchChord(fqArr) {
  if (Object.keys(fingerprints).length < CHORDS.length) return null;
  const [lo,hi] = guitarBins(anl.fftSize, actx.sampleRate);
  let best=null, bestScore=MATCH_THRES;
  for (const [ch, fp] of Object.entries(fingerprints)) {
    const s = cosineSim(fqArr, fp, lo, hi);
    if (s > bestScore) { bestScore=s; best=ch; }
  }
  return best;
}

function averageSnaps(snaps) {
  const fp = new Float32Array(snaps[0].length);
  for (const s of snaps) for (let i=0;i<fp.length;i++) fp[i]+=s[i]/snaps.length;
  return fp;
}

// ─── Calibration UI ───────────────────────────────────────────────────────────
function showCalibPanel(show) {
  document.getElementById('calib-panel').style.display = show ? 'flex' : 'none';
  document.getElementById('chord-panel').style.display = show ? 'none' : 'flex';
}

function updateCalibUI(status='') {
  const ch = CHORDS[calibIdx] || '';
  const p  = PAL[ch] || {};
  const el = document.getElementById('calib-chord-name');
  el.textContent = ch;
  el.style.background = p.bg||'#f4f4f0';
  el.style.color = p.tx||'#1a1a1a';
  const filled = '⬤'.repeat(calibCount);
  const empty  = '○'.repeat(CALIB_STRUMS - calibCount);
  document.getElementById('calib-progress').textContent = filled + ' ' + empty;
  document.getElementById('calib-title').textContent =
    `CALIBRACIÓN  ${calibIdx+1}/${CHORDS.length}`;
  document.getElementById('calib-status').textContent = status || 'rasguea el acorde…';
  document.getElementById('calib-bar-fill').style.width =
    `${((calibIdx*CALIB_STRUMS + calibCount)/(CHORDS.length*CALIB_STRUMS))*100}%`;
}

function finishCalibration() {
  showCalibPanel(false);
  S.micMode='ready';
  document.getElementById('mbtn').textContent='🎤 Micrófono: ON';
  document.getElementById('mbtn').className='mbtn on';
  document.getElementById('chord-big').textContent='…';
  document.getElementById('chord-hz').textContent='escuchando…';
}

// ─── Mic analysis ─────────────────────────────────────────────────────────────
function analyzeMic(now) {
  const fqArr = fqBuf;
  anl.getByteFrequencyData(fqArr);
  anl.getFloatTimeDomainData(timeBuf);
  S.wave = timeBuf;

  // RMS from time-domain buffer
  let rms=0;
  for (let i=0;i<timeBuf.length;i++) rms+=timeBuf[i]*timeBuf[i];
  rms=Math.sqrt(rms/timeBuf.length);

  // Smooth envelopes
  envFast = Math.max(rms, envFast*0.72);
  envSlow = rms*0.025 + envSlow*0.975;

  if (S.micMode==='calibrating') {
    runCalibStep(fqArr, rms, now);
  } else if (S.micMode==='ready') {
    runDetect(fqArr, rms, now);
  }
}

function runCalibStep(fqArr, rms, now) {
  switch(calibPhase) {
    case 'idle':
      if (rms > ONSET_THRES && envFast > envSlow*2.5) {
        calibPhase='transient'; calibPhaseT=now;
        updateCalibUI('✓ detectado…');
      }
      break;
    case 'transient':
      // Wait for transient to settle, then snapshot
      if (now-calibPhaseT > 55) {
        calibSnaps.push(new Uint8Array(fqArr));
        calibCount++;
        const done = calibCount >= CALIB_STRUMS;
        updateCalibUI(done ? `✓ ${CHORDS[calibIdx]} guardado` : `✓ ${calibCount}/${CALIB_STRUMS}`);
        if (done) {
          fingerprints[CHORDS[calibIdx]] = averageSnaps(calibSnaps.map(s=>new Float32Array(s)));
          calibPhase='advance'; calibPhaseT=now;
        } else {
          calibPhase='cooldown'; calibPhaseT=now;
        }
      }
      break;
    case 'cooldown':
      // Wait for silence before allowing next strum
      if (rms<0.010 && now-calibPhaseT>350) { calibPhase='idle'; updateCalibUI(); }
      break;
    case 'advance':
      // Brief pause before moving to next chord
      if (now-calibPhaseT > 900) {
        calibIdx++;
        calibCount=0; calibSnaps=[];
        if (calibIdx >= CHORDS.length) {
          finishCalibration();
        } else {
          calibPhase='idle'; updateCalibUI();
        }
      }
      break;
  }
}

function runDetect(fqArr, rms, now) {
  switch(rtPhase) {
    case 'idle':
      // Onset: energy spike above ambient level AND minimum absolute level
      if (envFast > envSlow*2.8 && rms > ONSET_THRES && now > S.detCooldown) {
        rtPhase='transient'; rtPhaseT=now;
      }
      break;
    case 'transient':
      // Wait ~50ms for transient to settle, then classify
      if (now-rtPhaseT > 50) {
        const ch = matchChord(fqArr);
        if (ch) {
          S.det=ch; S.detAt=now;
          S.detCooldown=now+460;
          trySlash(ch);
          updateChordDisplay(now, ch);
        }
        rtPhase='idle';
      }
      break;
  }
}

// ─── Game / canvas / sound setup (unchanged from before) ──────────────────────
const gc=document.getElementById('gc'), gx=gc.getContext('2d');
const wc=document.getElementById('wc'), wx=wc.getContext('2d');
let WW=wc.width, WH=wc.height;

const S={
  status:'intro', score:0, combo:0, lives:3, level:1,
  orbs:[], slashes:[], misses:[], popups:[],
  st:0, si:2300, lt:0,
  wave: new Float32Array(2048),
  micMode:'off',   // 'off' | 'calibrating' | 'ready'
  det:null, detAt:0, detCooldown:0,
};

let actx=null, anl=null, mstr=null, timeBuf=null, fqBuf=null, sndCtx=null;

function getSnd(){if(!sndCtx||sndCtx.state==='closed')sndCtx=new AudioContext();return sndCtx;}
function playHit(perf){
  const c=getSnd(),t=c.currentTime,o=c.createOscillator(),g=c.createGain();
  o.connect(g);g.connect(c.destination);o.type='sine';
  if(perf){o.frequency.setValueAtTime(880,t);o.frequency.setValueAtTime(1320,t+.07);}
  else o.frequency.setValueAtTime(660,t);
  g.gain.setValueAtTime(.2,t);g.gain.exponentialRampToValueAtTime(.001,t+.28);
  o.start(t);o.stop(t+.28);
}
function playLose(){
  const c=getSnd(),t=c.currentTime,o=c.createOscillator(),g=c.createGain();
  o.connect(g);g.connect(c.destination);o.type='triangle';
  o.frequency.setValueAtTime(260,t);o.frequency.exponentialRampToValueAtTime(65,t+.5);
  g.gain.setValueAtTime(.25,t);g.gain.exponentialRampToValueAtTime(.001,t+.5);
  o.start(t);o.stop(t+.5);
}

function mkOrb(){
  const ch=CHORDS[Math.floor(Math.random()*CHORDS.length)];
  return{id:Math.random(),chord:ch,x:45+Math.random()*(GW-90),y:-42,
    speed:1.1+Math.random()*.5+(S.level-1)*.22,r:30,wb:Math.random()*Math.PI*2};
}
function mkSlash(x,y,ch,perf){
  const pts=Array.from({length:12},()=>{const a=Math.random()*Math.PI*2,sp=2+Math.random()*5;return{vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,px:0,py:0,r:3+Math.random()*3};});
  return{id:Math.random(),x,y,chord:ch,op:1,sc:1,pts,perf};
}
function mkPop(x,y,v,perf){return{id:Math.random(),x,y,val:v,op:1,dy:0,perf};}

function trySlash(ch){
  if(S.status!=='playing') return;
  let best=-1,bestY=-Infinity;
  for(let i=0;i<S.orbs.length;i++){if(S.orbs[i].chord===ch&&S.orbs[i].y>bestY){bestY=S.orbs[i].y;best=i;}}
  if(best!==-1){
    const o=S.orbs.splice(best,1)[0];
    S.combo++;
    const onLine=Math.abs(o.y-SLASH_Y)<24;
    const pts=(onLine?20:10)*Math.min(S.combo,5);
    S.score+=pts;
    S.slashes.push(mkSlash(o.x,o.y,o.chord,onLine));
    S.popups.push(mkPop(o.x,o.y-22,pts,onLine));
    playHit(onLine);
  }
  updateHUD();
}

function startGame(){
  Object.assign(S,{status:'playing',score:0,combo:0,lives:3,level:1,orbs:[],slashes:[],misses:[],popups:[],si:2300,detCooldown:0});
  S.st=S.lt=performance.now();
  document.getElementById('ov').style.display='none';
  updateHUD();
}
function updateHUD(){
  document.getElementById('score').textContent=S.score;
  document.getElementById('combo').textContent=S.combo>1?`${S.combo}×`:'—';
  document.getElementById('level').textContent=S.level;
  const h=Math.max(0,S.lives);
  document.getElementById('lives').textContent='♥'.repeat(h)+'♡'.repeat(3-h);
}
function showOverlay(html){document.getElementById('oc').innerHTML=html;document.getElementById('ov').style.display='flex';}
function showIntro(){
  const chips=CHORDS.map(ch=>`<span style="display:inline-block;margin:2px;padding:2px 8px;background:${PAL[ch].bg};border:1px solid ${PAL[ch].bdr};border-radius:4px;color:${PAL[ch].tx};font-weight:700;font-size:11px;">${KMR[ch]} → ${ch}</span>`).join('');
  showOverlay(`<h2>Vibra</h2><p>Los orbes caen con el acorde.<br>Tocalo para destruirlos en cualquier punto.<br><span style="color:#d97706;font-weight:700;">×2 puntos</span> en la línea exacta.<br><br>${chips}</p><button class="btn" onclick="startGame()">Empezar</button>`);
}
function showGameOver(){showOverlay(`<h2>Game over</h2><div class="big">${S.score}</div><button class="btn" onclick="startGame()">Reintentar</button>`);}

function updateChordDisplay(now, chord){
  const el=document.getElementById('chord-big');
  const sub=document.getElementById('chord-hz');
  if(S.micMode==='off'){el.textContent='—';el.style.color='#ddd';sub.textContent='';return;}
  if(S.micMode==='calibrating') return;
  if(!chord){
    const age=S.det?now-S.detAt:9999;
    const fade=Math.max(0,1-age/2200);
    if(S.det){el.textContent=S.det;el.style.color=fade>.1?PAL[S.det].bdr:'#ddd';}
    else{el.textContent='…';el.style.color='#ccc';}
    if(fade<=0){S.det=null;sub.textContent='';}
    return;
  }
  el.textContent=chord; el.style.color=PAL[chord].bdr;
  sub.textContent='detectado';
  setTimeout(()=>{if(sub)sub.textContent='';},800);
}

function drawGame(now){
  gx.clearRect(0,0,GW,GH);gx.fillStyle='#f9f9f6';gx.fillRect(0,0,GW,GH);
  gx.strokeStyle='rgba(0,0,0,.04)';gx.lineWidth=1;
  for(let x=0;x<GW;x+=36){gx.beginPath();gx.moveTo(x,0);gx.lineTo(x,GH);gx.stroke();}
  for(let y=0;y<GH;y+=36){gx.beginPath();gx.moveTo(0,y);gx.lineTo(GW,y);gx.stroke();}
  gx.fillStyle='rgba(0,0,0,.025)';gx.fillRect(0,SLASH_Y,GW,GH-SLASH_Y);
  gx.setLineDash([5,4]);gx.strokeStyle='rgba(0,0,0,.18)';gx.lineWidth=1;
  gx.beginPath();gx.moveTo(0,SLASH_Y);gx.lineTo(GW,SLASH_Y);gx.stroke();
  gx.setLineDash([]);gx.fillStyle='rgba(0,0,0,.28)';
  gx.font='bold 8px -apple-system,sans-serif';gx.textAlign='left';
  gx.fillText('◆  SLASH ZONE  ×2',8,SLASH_Y-8);
  for(const o of S.orbs){
    const p=PAL[o.chord],wx2=Math.sin(now*.0012+o.wb)*2.5,cx=o.x+wx2,cy=o.y;
    const dist=SLASH_Y-cy;
    if(dist>0&&dist<110){const t=1-dist/110,al=Math.floor(t*160).toString(16).padStart(2,'0');gx.beginPath();gx.arc(cx,cy,o.r+4+t*6,0,Math.PI*2);gx.strokeStyle=p.bdr+al;gx.lineWidth=1.5;gx.stroke();}
    gx.beginPath();gx.arc(cx+2,cy+3,o.r,0,Math.PI*2);gx.fillStyle='rgba(0,0,0,.07)';gx.fill();
    gx.beginPath();gx.arc(cx,cy,o.r,0,Math.PI*2);gx.fillStyle=p.bg;gx.fill();gx.strokeStyle=p.bdr;gx.lineWidth=2;gx.stroke();
    gx.fillStyle=p.tx;gx.font=`700 ${o.chord.length>2?13:16}px -apple-system,sans-serif`;
    gx.textAlign='center';gx.textBaseline='middle';gx.fillText(o.chord,cx,cy);
  }
  for(const sl of S.slashes){
    const p=PAL[sl.chord];gx.globalAlpha=sl.op;
    gx.beginPath();gx.arc(sl.x,sl.y,30*sl.sc,0,Math.PI*2);gx.strokeStyle=p.bdr;gx.lineWidth=Math.max(.5,2.5*(2-sl.sc));gx.stroke();
    if(sl.perf){gx.beginPath();gx.arc(sl.x,sl.y,44*sl.sc,0,Math.PI*2);gx.strokeStyle=p.bdr+'55';gx.lineWidth=1;gx.stroke();}
    for(const pt of sl.pts){gx.beginPath();gx.arc(sl.x+pt.px,sl.y+pt.py,pt.r*sl.op,0,Math.PI*2);gx.fillStyle=p.bdr;gx.fill();}
    if(sl.op>.55){gx.strokeStyle=p.bdr;gx.lineWidth=2.5;gx.lineCap='round';gx.beginPath();gx.moveTo(sl.x-9,sl.y+1);gx.lineTo(sl.x-3,sl.y+7);gx.lineTo(sl.x+10,sl.y-7);gx.stroke();gx.lineCap='butt';}
    gx.globalAlpha=1;
  }
  for(const sp of S.popups){
    gx.globalAlpha=sp.op;
    if(sp.perf){gx.fillStyle='#d97706';gx.font='bold 11px -apple-system,sans-serif';gx.textAlign='center';gx.textBaseline='middle';gx.fillText('PERFECT',sp.x,sp.y+sp.dy-14);}
    gx.fillStyle='#1a1a1a';gx.font=`bold ${sp.perf?16:13}px -apple-system,sans-serif`;
    gx.textAlign='center';gx.textBaseline='middle';gx.fillText(`+${sp.val}`,sp.x,sp.y+sp.dy);gx.globalAlpha=1;
  }
  for(const m of S.misses){gx.globalAlpha=m.op;gx.fillStyle='#ef4444';gx.font='bold 22px sans-serif';gx.textAlign='center';gx.textBaseline='middle';gx.fillText('✕',m.x,m.y);gx.globalAlpha=1;}
  gx.textAlign='left';gx.textBaseline='alphabetic';
}

function drawWave(now){
  wx.clearRect(0,0,WW,WH);wx.fillStyle='#fff';wx.fillRect(0,0,WW,WH);
  const col=S.micMode!=='off'?'#16a34a':'#e5e5e0';
  wx.strokeStyle=col;wx.lineWidth=1.5;wx.beginPath();
  if(S.micMode!=='off'&&S.wave.length>0){
    for(let i=0;i<WW;i++){const idx=Math.floor(i/WW*S.wave.length);const y=WH/2+S.wave[idx]*WH*.44;i===0?wx.moveTo(i,y):wx.lineTo(i,y);}
  } else {
    const t=now*.002;
    for(let i=0;i<WW;i++){const y=WH/2+Math.sin(i*.055+t)*7+Math.sin(i*.018+t*.6)*3;i===0?wx.moveTo(i,y):wx.lineTo(i,y);}
  }
  wx.stroke();
}

function loop(now){
  if(S.micMode!=='off'&&anl) analyzeMic(now);
  if(S.status==='playing'){
    if(now-S.st>S.si){S.st=now;S.orbs.push(mkOrb());}
    if(now-S.lt>22000){S.level++;S.si=Math.max(950,S.si-210);S.lt=now;updateHUD();}
    for(let i=S.orbs.length-1;i>=0;i--){
      S.orbs[i].y+=S.orbs[i].speed;
      if(S.orbs[i].y>GH+50){
        const o=S.orbs.splice(i,1)[0];S.lives=Math.max(0,S.lives-1);S.combo=0;
        S.misses.push({id:Math.random(),x:o.x,y:GH-40,op:1});
        playLose();
        if(S.lives<=0){S.lives=0;S.status='gameover';showGameOver();}
        updateHUD();
      }
    }
    for(let i=S.slashes.length-1;i>=0;i--){const sl=S.slashes[i];sl.op-=.036;sl.sc+=.04;for(const pt of sl.pts){pt.px+=pt.vx*.75;pt.py+=pt.vy*.75;pt.vy+=.18;}if(sl.op<=0)S.slashes.splice(i,1);}
    for(let i=S.popups.length-1;i>=0;i--){S.popups[i].op-=.03;S.popups[i].dy-=.9;if(S.popups[i].op<=0)S.popups.splice(i,1);}
    for(let i=S.misses.length-1;i>=0;i--){S.misses[i].op-=.028;S.misses[i].y-=1.2;if(S.misses[i].op<=0)S.misses.splice(i,1);}
  }
  drawGame(now);drawWave(now);updateChordDisplay(now,null);
  requestAnimationFrame(loop);
}

// ─── Mic toggle ────────────────────────────────────────────────────────────────
async function toggleMic(){
  const btn=document.getElementById('mbtn');
  if(S.micMode!=='off'){
    if(mstr)mstr.getTracks().forEach(t=>t.stop());
    if(actx)actx.close();
    actx=anl=mstr=timeBuf=fqBuf=null;
    envFast=envSlow=0;
    S.micMode='off';S.wave=new Float32Array(2048);S.det=null;
    calibIdx=0;calibCount=0;calibSnaps=[];calibPhase='idle';
    rtPhase='idle';
    showCalibPanel(false);
    btn.textContent='🎤 Activar micrófono';btn.className='mbtn';
    document.getElementById('chord-big').textContent='—';
    document.getElementById('chord-hz').textContent='';
    return;
  }
  try{
    mstr=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    actx=new AudioContext();
    const src=actx.createMediaStreamSource(mstr);
    anl=actx.createAnalyser();
    anl.fftSize=4096;              // 4096-pt FFT → ~10.8 Hz/bin @ 44100 Hz
    anl.smoothingTimeConstant=0.2; // light smoothing for stable fingerprints
    timeBuf=new Float32Array(anl.fftSize);
    fqBuf=new Uint8Array(anl.frequencyBinCount);
    src.connect(anl);
    // Start calibration
    S.micMode='calibrating';
    calibIdx=0;calibCount=0;calibSnaps=[];calibPhase='idle';
    showCalibPanel(true);
    updateCalibUI();
    btn.textContent='🎤 Calibrando…';btn.className='mbtn calib';
  } catch(e){alert('Error de micrófono: '+e.message);}
}

// ─── UI wiring ─────────────────────────────────────────────────────────────────
const cbw=document.getElementById('cbbtns');
CHORDS.forEach(ch=>{
  const p=PAL[ch],b=document.createElement('button');
  b.className='cb';b.textContent=ch;
  b.style.cssText=`background:${p.bg};border-color:${p.bdr};color:${p.tx}`;
  b.addEventListener('pointerdown',()=>trySlash(ch));
  cbw.appendChild(b);
});

document.getElementById('mbtn').addEventListener('click',toggleMic);

window.addEventListener('keydown',e=>{
  if(e.repeat) return;
  const ch=KEY_MAP[e.key.toLowerCase()];
  if(ch) trySlash(ch);
  if((e.key==='Enter'||e.key===' ')&&(S.status==='intro'||S.status==='gameover')){startGame();e.preventDefault();}
});

function resizeWave(){
  const w=Math.max(200,Math.min(360,document.getElementById('right').offsetWidth||260));
  if(wc.width!==w){wc.width=w;WW=w;}
}
window.addEventListener('resize',resizeWave);
resizeWave();

showIntro();updateHUD();
requestAnimationFrame(loop);
</script>
